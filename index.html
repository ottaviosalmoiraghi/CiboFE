<!doctype html>
<html lang="it">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <!-- navbar -->
    <nav class="navbar bg-body-tertiary fixed-top">
        <div class="container-fluid">
            <h1 class="text-center">Velkina cucina</h1>
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar"
                aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar"
                aria-labelledby="offcanvasNavbarLabel">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Menu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav justify-content-end flex-grow-1 pe-3 gap-2">
                        <li class="nav-item">
                            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas"
                                data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar"
                                aria-label="Toggle navigation" id="navVediRicette">
                                Vedi Ricette
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas"
                                data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar"
                                aria-label="Toggle navigation" id="navInserisciRicette">
                                Inserisci Ricette
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <!-- main -->
    <main class="container mt-5 pt-4">
        <div class="d-none" id="vediRicette">
            <h1 class="text-center">Vedi Ricette</h1>
            <div class="d-grid col-md-3 mx-auto pt-4">
                <label for="portataIndex" class="form-label">Portata</label>
                <select class="form-select" aria-label="Default select example" id="portataIndex">
                    <option selected value="">Seleziona la portata da vedere</option>
                    <option value="PRIMO PIATTO">Primo Piatto</option>
                    <option value="SECONDO PIATTO">Secondo Piatto</option>
                    <option value="PIATTO UNICO">Piatto Unico</option>
                    <option value="CONTORNO">Contorno</option>
                    <option value="DOLCE">Dolce</option>
                    <option value="ANTIPASTO">Antipasto</option>
                    <option value="TUTTE">Tutte</option>
                </select>
            </div>
            <div class="d-grid col-md-2 mx-auto pt-4">
                <button class="btn btn-primary" type="submit" id="btn">Vedi Ricette</button>
            </div>
            <div class="pt-4" id="containerTabella">
                <div id="tabellaRicette"></div>
            </div>
        </div>
        <div class="d-none" id="inserisciRicette">
            <h1 class="text-center">Inserisci Ricetta</h1>
            <div class="d-grid mx-auto pt-4">
                <label for="nomeRicettaInput" class="form-label">Nome Ricetta</label>
                <input type="text" class="form-control" id="nomeRicettaInput"
                    placeholder="Inserisci il nome della ricetta">
            </div>
            <div class="d-grid mx-auto pt-4">
                <label for="inserimentoPortata" class="form-label">Portata Ricetta</label>
                <select class="form-select" aria-label="Default select example" id="inserimentoPortata">
                    <option selected value="">Seleziona la portata della ricetta</option>
                    <option value="PRIMO PIATTO">Primo Piatto</option>
                    <option value="SECONDO PIATTO">Secondo Piatto</option>
                    <option value="PIATTO UNICO">Piatto Unico</option>
                    <option value="CONTORNO">Contorno</option>
                    <option value="DOLCE">Dolce</option>
                    <option value="ANTIPASTO">Antipasto</option>
                </select>
            </div>
            <div class="row g-3 align-items-center pt-4">
                <div class="col-auto">
                    <label for="numeroIngredientiInput" class="form-label">Numero Ingredienti</label>
                </div>
                <div class="col-md-6">
                    <input type="number" class="form-control" id="numeroIngredientiInput"
                        placeholder="Inserisci il numero di ingredienti">
                </div>
            </div>
            <div class="d-grid col-md-2 mx-auto pt-4">
                <button class="btn btn-primary disabled" type="submit" id="btnIngredienti">Aggiungi Ingredienti</button>
            </div>
            <div class="d-grid col-md-2 mx-auto pt-4">
                <button class="btn btn-primary d-none" type="submit" id="btnInserimentoRicetta">Inserisci Ricetta</button>
            </div>
        </div>
    </main>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./js/script.js"></script>
</body>

</html>
