<!doctype html>
<html lang="it">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Velkina Cucina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #ccc;
            border-top: 5px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
    </style>
</head>

<body>
    <!-- navbar -->
    <nav class="navbar bg-body-tertiary fixed-top">
        <div class="container-fluid">
            <h1 class="text-center">Velkina cucina</h1>
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar"
                aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar"
                aria-labelledby="offcanvasNavbarLabel">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Menu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav justify-content-end flex-grow-1 pe-3 gap-2">
                        <li class="nav-item">
                            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas"
                                data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar"
                                aria-label="Toggle navigation" id="navVediRicette">
                                Vedi Ricette
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas"
                                data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar"
                                aria-label="Toggle navigation" id="navInserisciRicette">
                                Inserisci Ricette
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas"
                                data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar"
                                aria-label="Toggle navigation" id="navMealPrep">
                                Meal Prep
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas"
                                data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar"
                                aria-label="Toggle navigation" id="navCalendario">
                                Pasti Settimana
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas"
                                data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar"
                                aria-label="Toggle navigation" id="navListaSpesa">
                                Lista Della Spesa
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <!-- main -->
    <main class="container mt-5 pt-4">
        <div class="d-none d-flex flex-column" id="vediRicette" style="height: calc(100vh - 72px);">
            <h1 class="text-center">Ricette</h1>
            <div class="d-grid col-md-3 mx-auto pt-4">
                <label for="portataIndex" class="form-label">Portata</label>
                <select class="form-select" aria-label="Default select example" id="portataIndex">
                    <option selected value="" disabled>Seleziona la portata da vedere</option>
                    <option value="PRIMO PIATTO">Primo Piatto</option>
                    <option value="SECONDO PIATTO">Secondo Piatto</option>
                    <option value="PIATTO UNICO">Piatto Unico</option>
                    <option value="CONTORNO">Contorno</option>
                    <option value="DOLCE">Dolce</option>
                    <option value="ANTIPASTO">Antipasto</option>
                    <option value="TUTTE">Tutte</option>
                </select>
            </div>
            <div class="d-grid col-md-2 mx-auto pt-4 pb-4">
                <button class="btn btn-primary" type="submit" id="btn">Vedi Ricette</button>
            </div>
            <div class="overflow-auto" id="containerTabella">
                <div id="tabellaRicette"></div>
            </div>
        </div>
        <div class="d-none d-flex flex-column" style="height: calc(100vh - 72px);" id="inserisciRicette">
            <h1 class="text-center">Inserisci</h1>
            <div class="d-grid mx-auto pt-4">
                <label for="nomeRicettaInput" class="form-label">Nome Ricetta</label>
                <input type="text" class="form-control" id="nomeRicettaInput"
                    placeholder="Inserisci il nome della ricetta">
            </div>
            <div class="d-grid mx-auto pt-4">
                <label for="inserimentoPortata" class="form-label">Portata Ricetta</label>
                <select class="form-select" aria-label="Default select example" id="inserimentoPortata">
                    <option selected value="">Seleziona la portata della ricetta</option>
                    <option value="PRIMO PIATTO">Primo Piatto</option>
                    <option value="SECONDO PIATTO">Secondo Piatto</option>
                    <option value="PIATTO UNICO">Piatto Unico</option>
                    <option value="CONTORNO">Contorno</option>
                    <option value="DOLCE">Dolce</option>
                    <option value="ANTIPASTO">Antipasto</option>
                </select>
            </div>
            <div class="row g-3 align-items-center pt-4">
                <label for="numeroIngredientiInput" class="form-label">Numero Ingredienti</label>
                <input type="number" class="form-control" id="numeroIngredientiInput"
                    placeholder="Inserisci il numero di ingredienti">
            </div>
            <div class="d-grid col-md-2 mx-auto pt-4 pb-4">
                <button class="btn btn-primary disabled" type="submit" id="btnIngredienti">Aggiungi Ingredienti</button>
            </div>
            <div class="pt-4 overflow-auto" id="containerInputIngredienti">
                <div id="inputIngredienti" class="p-3"></div>
            </div>
            <div class="d-grid col-md-2 mx-auto pt-4 pb-4">
                <button class="btn btn-primary d-none" type="submit" id="btnInserimentoRicetta">Inserisci
                    Ricetta</button>
            </div>
        </div>
        <div class="d-none d-flex flex-column" style="height: calc(100vh - 72px);" id="mealPrep">
            <h1 class="text-center">Meal Prep</h1>
            <div class="pt-4 overflow-auto" id="containerMealPrep">
                <div id="tabellaMealPrep">
                    <table class="table table-striped-columns">
                        <thead>
                            <tr>
                                <th class="no-top-border"></th>
                                <th>Pranzo</th>
                                <th>Cena</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <th>Lunedì</th>
                                <th>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="pran1L"></select>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="pran2L"></select>
                                </th>
                                <th>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="cena1L"></select>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="cena2L"></select>
                                </th>
                            </tr>
                            <tr>
                                <th>Martedì</th>
                                <th>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="pran1Ma"></select>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="pran2Ma"></select>
                                </th>
                                <th>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="cena1Ma"></select>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="cena2Ma"></select>
                                </th>
                            </tr>
                            <tr>
                                <th>Mercoledì</th>
                                <th>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="pran1Me"></select>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="pran2Me"></select>
                                </th>
                                <th>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="cena1Me"></select>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="cena2Me"></select>
                                </th>
                            </tr>
                            <tr>
                                <th>Giovedì</th>
                                <th>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="pran1G"></select>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="pran2G"></select>
                                </th>
                                <th>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="cena1G"></select>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="cena2G"></select>
                                </th>
                            </tr>
                            <tr>
                                <th>Venerdì</th>
                                <th>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="pran1V"></select>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="pran2V"></select>
                                </th>
                                <th>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="cena1V"></select>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="cena2V"></select>
                                </th>
                            </tr>
                            <tr>
                                <th>Sabato</th>
                                <th>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="pran1S"></select>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="pran2S"></select>
                                </th>
                                <th>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="cena1S"></select>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="cena2S"></select>
                                </th>
                            </tr>
                            <tr>
                                <th>Domenica</th>
                                <th>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="pran1D"></select>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="pran2D"></select>
                                </th>
                                <th>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="cena1D"></select>
                                    <select class="form-select settimana" aria-label="Default select example"
                                        id="cena2D"></select>
                                </th>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="d-grid col-md-2 mx-auto pt-4 pb-4">
                <button class="btn btn-primary" type="submit" id="btnConfermaMealPrep">Conferma Meal Prep</button>
            </div>
            <!-- <div class="d-grid col-md-2 mx-auto pt-4">
                <button class="btn btn-danger" type="submit" id="btnResettaMealPrep">Resetta Meal Prep</button>
            </div> -->
        </div>
        <div class="d-none" id="vediCalendario">
            <h1 class="text-center">Pasti Della Settimana</h1>
            <div class="pt-4" id="containerCalendario">
                <div id="tabellaCalendario">
                    <table class="table table-striped-columns">
                        <thead>
                            <tr>
                                <th class="no-top-border"></th>
                                <th>Pranzo</th>
                                <th>Cena</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <th>Lunedì</th>
                                <th class="calendario" id="pranzolunedi"></th>
                                <th class="calendario" id="cenalunedi"></th>
                            </tr>
                            <tr>
                                <th>Martedì</th>
                                <th class="calendario" id="pranzomartedi"></th>
                                <th class="calendario" id="cenamartedi"></th>
                            </tr>
                            <tr>
                                <th>Mercoledì</th>
                                <th class="calendario" id="pranzomercoledi"></th>
                                <th class="calendario" id="cenamercoledi"></th>
                            </tr>
                            <tr>
                                <th>Giovedì</th>
                                <th class="calendario" id="pranzogiovedi"></th>
                                <th class="calendario" id="cenagiovedi"></th>
                            </tr>
                            <tr>
                                <th>Venerdì</th>
                                <th class="calendario" id="pranzovenerdi"></th>
                                <th class="calendario" id="cenavenerdi"></th>
                            </tr>
                            <tr>
                                <th>Sabato</th>
                                <th class="calendario" id="pranzosabato"></th>
                                <th class="calendario" id="cenasabato"></th>
                            </tr>
                            <tr>
                                <th>Domenica</th>
                                <th class="calendario" id="pranzodomenica"></th>
                                <th class="calendario" id="cenadomenica"></th>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="d-flex flex-column d-none" style="height: calc(100vh - 72px);" id="vediMakeLista">
            <h1 class="text-center">Meal Prep</h1>
            <div class="row flex-fill overflow-auto" id="listeContainer">
                <div id="listaIngredienti" class="col-6 border-end border-primary">
                    <ul id="ulIngredienti" class="list-group">
                        <li class="list-group-item text-bg-primary text-center">Ingredienti necessari</li>
                    </ul>
                </div>
                <div id="listaPresenti" class="col-6 border-start border-primary">
                    <ul id="ulPresenti" class="list-group">
                        <li class="list-group-item text-bg-primary text-center">Ingredienti presenti</li>
                    </ul>
                </div>
            </div>
            <div class="d-grid col-md-2 mx-auto pt-4 pb-4">
                <button class="btn btn-primary" type="submit" id="btnConfermaLista">Conferma Lista</button>
            </div>
        </div>
        <div class="d-flex flex-column d-none" style="height: calc(100vh - 72px);" id="vediListaSpesa">
            <h1 class="text-center">Lista Della Spesa</h1>
            <div class="row overflow-auto" id="listaContainer">
                <ul id="ulListaSpesa" class="list-group col-md-3 mx-auto p-4">
                </ul>
            </div>
            <div class="d-grid col-md-2 mx-auto pt-4 pb-4">
                <button class="btn btn-primary" type="submit" id="btnSalvaLista">Salva Lista Della Spesa</button>
            </div>
        </div>
    </main>

    <!-- Caricamento -->
    <div id="loadingScreen" class="z-3 d-none">
        <div class="loader"></div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script type="module" src="./js/scriptVedi.js"></script>
    <script type="module" src="./js/scriptInsert.js"></script>
    <script type="module" src="./js/scriptMealPrep.js"></script>
    <script type="module" src="./js/scriptCalendario.js"></script>
    <script type="module" src="./js/scriptListaSpesa.js"></script>
    <script>
        // Simulazione caricamento
        setTimeout(() => {
            document.getElementById("loadingScreen").classList.add("d-none");
        }, 10000);
    </script>

</body>

</html>
